<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Folder Fan — TaskConductor</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080a0d;
  --green: #22c55e;
  --border: rgba(255,255,255,0.08);
  --text: #eef0f2;
  --dim: rgba(238,240,242,0.38);
  /* card dims */
  --cw: 152px;
  --ch: 212px;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  display: flex; flex-direction: column;
}

/* ─── NAV ─────────────────────────────── */
.nav {
  height: 50px;
  display: flex; align-items: center;
  padding: 0 18px; gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 20;
}
.logo { width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.09);display:flex;align-items:center;justify-content:center;font-size:12px; }
.nav-ico { width:26px;height:26px;border-radius:5px;background:transparent;border:none;cursor:pointer;color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:13px; }
.date-pill { font-size:11px;color:var(--dim);padding:3px 9px;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;gap:5px; }
.meet { background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px; }
.meet.live { background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.28);color:rgba(167,243,208,0.9); }
.ldot { width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.sp { flex:1; }
.btn { padding:4px 11px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);display:flex;align-items:center;gap:4px;white-space:nowrap; }
.btn.g { background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#86efac; }
.notif { position:relative; }
.notif-badge { position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:#ef4444;border:1.5px solid var(--bg); }
.ava-pill { width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#4ade80,#16a34a);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0; }

/* ─── TOOLBAR ─────────────────────────── */
.toolbar { height:38px;display:flex;align-items:center;padding:0 18px;gap:6px;border-bottom:1px solid var(--border);flex-shrink:0; }
.pill { padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:4px; }
.pill.on { background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.16);color:var(--text); }

/* ─── STAGE ───────────────────────────── */
.stage {
  position: relative;
  flex: 1; overflow: hidden; min-height: 0;
  /* Radial green glow from center-left */
  background: radial-gradient(ellipse 55% 70% at 40% 55%, rgba(34,197,94,0.04) 0%, transparent 65%);
}

/* CSS 3D perspective container */
.scene {
  position: absolute; inset: 0;
  perspective: 1100px;
  perspective-origin: 48% 46%;
}

/* 3D fan anchor — centered, tilted slightly overhead */
#fan {
  position: absolute;
  /* shift left so active card sits at ~38% of screen width */
  left: calc(50% - 80px);
  top: 50%;
  width: 1px; height: 1px;
  transform-style: preserve-3d;
  /* Slight overhead tilt for the dramatic looking-down-at-spread-cards effect */
  transform: rotateX(-14deg);
}

/* ─── CARD WRAPPER (3D positioned) ────── */
.cw {
  position: absolute;
  left: calc(var(--cw) / -2);
  top: calc(var(--ch) / -2);
  width: var(--cw);
  height: var(--ch);
  transform-style: preserve-3d;
  transition:
    transform  0.58s cubic-bezier(0.34, 1.18, 0.64, 1),
    opacity    0.42s ease;
  cursor: pointer;
}

/* ─── CARD VISUAL ─────────────────────── */
.card {
  width: 100%; height: 100%;
  border-radius: 11px;
  /* BRIGHT WHITE FROSTED appearance (no backdrop-filter — breaks preserve-3d) */
  background: linear-gradient(
    158deg,
    rgba(230, 238, 250, 0.16) 0%,
    rgba(200, 215, 235, 0.08) 60%,
    rgba(180, 200, 225, 0.05) 100%
  );
  border: 1px solid rgba(255,255,255,0.26);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.32),
    inset 0 0 24px rgba(255,255,255,0.04),
    0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden;
  position: relative;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* Light reflection sheen on inactive cards */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.06) 35%,
    transparent 60%
  );
  pointer-events: none;
}

/* Active card — solid green */
.card.active {
  background: linear-gradient(150deg, #1a5c38 0%, #1e7845 40%, #178040 100%);
  border-color: rgba(134,239,172,0.55);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 0  70px rgba(34,197,94,0.32),
    0 12px 48px rgba(0,0,0,0.7);
}
.card.active::before {
  background: linear-gradient(145deg, rgba(255,255,255,0.18) 0%, transparent 50%);
}

/* Wireframe lines on inactive cards */
.lines { padding: 16px 13px 0; display:flex;flex-direction:column;gap:8px; }
.ln { height: 2px; border-radius: 2px; background: rgba(0,8,30,0.22); }

/* Card footer — small avatars */
.card-footer {
  position: absolute; bottom: 10px; left: 13px; right: 13px;
  display:flex; align-items:center; gap:4px;
  border-top: 1px solid rgba(0,0,0,0.1);
  padding-top: 7px;
}
.av { width:13px;height:13px;border-radius:50%;background:rgba(0,0,0,0.15); }
.av:nth-child(2) { background:rgba(0,0,0,0.1); }
.av-dot { width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.12);margin-left:auto; }

/* Card short label */
.card-lbl {
  position: absolute; bottom: 10px; left: 0; right: 0;
  text-align: center;
  font-size: 8px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: rgba(255,255,255,0.18);
  pointer-events: none;
}

/* ─── ACTIVE CARD CONTENT ─────────────── */
.ac { padding:14px; height:100%; display:flex;flex-direction:column; position:relative; }
.ac-tag { font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,0.5);margin-bottom:5px; }
.ac-name { font-size:14px;font-weight:600;color:#fff;margin-bottom:2px; }
.ac-date { font-size:10px;color:rgba(255,255,255,0.45); }
.ac-num {
  margin-top: auto;
  font-size: 48px; font-weight: 800; line-height: 1;
  color: #fff; letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}
.ac-pct { font-size:22px;letter-spacing:0;font-weight:700; }
.ac-lbl2 { font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px; }
.ac-arr {
  position:absolute; top:12px; right:12px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,0.14);
  display:flex;align-items:center;justify-content:center;font-size:10px;
}

/* ─── ARC SVG ─────────────────────────── */
#arcSvg { position:absolute;inset:0;width:100%;height:100%;pointer-events:none; }

/* ─── KEY HINT ────────────────────────── */
.hint { position:absolute;bottom:10px;right:16px;font-size:9px;color:rgba(255,255,255,0.13);display:flex;gap:5px;align-items:center;pointer-events:none; }
.key { padding:1px 5px;border:1px solid rgba(255,255,255,0.1);border-radius:3px;font-size:9px; }

/* ─── DETAIL PANEL ────────────────────── */
.detail-wrap { padding: 0 18px 16px; flex-shrink:0; }
.dp {
  height: 162px;
  border-radius: 14px;
  /* Bright green-tinted frosted glass */
  background: linear-gradient(
    135deg,
    rgba(22, 101, 52, 0.45) 0%,
    rgba(15, 60, 35, 0.55) 100%
  );
  border: 1px solid rgba(74, 222, 128, 0.25);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr 1px 185px;
  gap: 0 18px;
  overflow: hidden;
  position: relative;
}
.dp::before {
  content:'';position:absolute;inset:0;
  background: linear-gradient(135deg, rgba(74,222,128,0.08) 0%, transparent 55%);
  pointer-events:none;
}
/* Tags floating above title */
.dp-tags { display:flex;gap:5px;margin-bottom:8px; }
.dp-tag { padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);font-size:9px;color:rgba(255,255,255,0.5); }
.dp-title { font-size:18px;font-weight:600;margin-bottom:2px; }
.dp-sub { font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px; }
.dp-row { display:flex;align-items:center;gap:8px;font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:8px; }
.dp-track { flex:1;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;position:relative;overflow:hidden; }
.dp-fill { position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:2px;transition:width .5s ease; }
.dp-file { display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px; }
.dp-fi { width:24px;height:24px;border-radius:5px;background:rgba(34,197,94,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0; }
.dp-div { background:rgba(255,255,255,0.07); }
.dp-r {}
.kv { margin-bottom:8px; }
.kv-l { font-size:9px;text-transform:uppercase;letter-spacing:0.6px;color:rgba(255,255,255,0.22);margin-bottom:2px; }
.kv-v { font-size:12px;font-weight:500;color:rgba(255,255,255,0.78); }
.here { display:inline-flex;align-items:center;gap:5px;background:var(--green);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600; }
.here-d { width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.55); }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">⚡</div>
  <button class="nav-ico">☰</button>
  <button class="nav-ico">⌕</button>
  <div class="date-pill">📅 January 12</div>
  <div class="meet">
    <div class="ldot" style="background:rgba(255,255,255,0.22)"></div>
    09:00 AM · Standup
  </div>
  <div class="meet live">
    <div class="ldot"></div>
    11:00 AM · Audit Committee Review
  </div>
  <div class="sp"></div>
  <button class="btn">↑ Export</button>

  <button class="nav-ico notif">🔔<span class="notif-badge"></span></button>

</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="pill on">📁 Folders (14)</div>
  <div class="pill">🏷 Tags (44)</div>
  <div class="pill">□ Small ▾</div>
</div>

<!-- STAGE -->
<div class="stage">
  <div class="scene">
    <svg id="arcSvg"></svg>
    <div id="fan"></div>
  </div>
  <div class="hint"><span class="key">←</span><span class="key">→</span></div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-wrap">
  <div class="dp" id="dp"></div>
</div>

<script>
/* ─── Data ──────────────────────────────── */
const DATA = [
  { short:'FOLIO', name:'Portfolio',   date:'Jan 01 – Mar 31', p:72,  doc:'Portfolio_Q1.pdf',          email:'portfolio@legal.io',  ev:'Portfolio Review',   due:'2 Weeks'   },
  { short:'LIC',   name:'Licensing',   date:'Jan 15 – Apr 15', p:62,  doc:'License_Agreement_v3.pdf',  email:'license@legal.io',    ev:'Renewal Deadline',   due:'3 Weeks'   },
  { short:'CON',   name:'Contracts',   date:'Jan 01 – Jun 30', p:78,  doc:'Contract_Bundle.pdf',       email:'contracts@legal.io',  ev:'Signature',          due:'3 Weeks'   },
  { short:'CORP',  name:'Corporate',   date:'Jan 01 – Mar 31', p:57,  doc:'Corporate_Report_Q1.pdf',   email:'corp@legal.io',       ev:'Board Review',       due:'Final'     },
  { short:'LEG',   name:'Legal',       date:'Jan 10 – Mar 10', p:91,  doc:'Legal_Brief_Memo.pdf',      email:'legal@corp.io',       ev:'Court Hearing',      due:'5 Days'    },
  { short:'TRA',   name:'Transaction', date:'Feb 15 – Apr 15', p:33,  doc:'Transaction_Log.pdf',       email:'trans@finance.io',    ev:'Closing',            due:'6 Weeks'   },
  { short:'COMP',  name:'Compliance',  date:'Jan 01 – Mar 31', p:87,  doc:'GDPR_Report_v4.pdf',        email:'compliance@legal.io', ev:'Risk Assessment',    due:'Final Val.'},
  { short:'VEN',   name:'Vendor',      date:'Mar 01 – May 30', p:54,  doc:'Vendor_Terms.pdf',          email:'vendor@ops.io',       ev:'Onboarding',         due:'2 Months'  },
  { short:'TAX',   name:'Tax',         date:'Jan 15 – Apr 15', p:29,  doc:'Tax_Filing_Q1.pdf',         email:'tax@finance.io',      ev:'Filing',             due:'5 Weeks'   },
  { short:'IP',    name:'IP Rights',   date:'Feb 01 – Mar 31', p:66,  doc:'IP_Registration.pdf',       email:'ip@legal.io',         ev:'Registration',       due:'3 Weeks'   },
  { short:'HR',    name:'HR Docs',     date:'Jan 01 – Dec 31', p:73,  doc:'HR_Policy_2025.pdf',        email:'hr@corp.io',          ev:'Policy Update',      due:'Q2 2025'   },
  { short:'FIN',   name:'Finance',     date:'Feb 01 – May 31', p:88,  doc:'Finance_Report_Q1.pdf',     email:'finance@corp.io',     ev:'Audit',              due:'1 Month'   },
  { short:'REG',   name:'Regulatory',  date:'Feb 15 – May 15', p:41,  doc:'Regulatory_Sub.pdf',        email:'reg@compliance.io',   ev:'Submission',         due:'7 Weeks'   },
  { short:'M&A',   name:'M&A',         date:'Mar 01 – Jun 30', p:17,  doc:'MA_Term_Sheet.pdf',         email:'ma@finance.io',       ev:'Due Diligence',      due:'3 Months'  },
];

/* ─── Fan constants ──────────────────── */
// Active card at index 3 ("Corporate"), so 3 cards on left, 10 on right
// matching the design: left side more open, right side densely packed
const ACTIVE_START = 3;
const ARC_R        = 490;   // arc radius
const ANGLE        = 10.5;  // degrees between cards
const PERSP        = 1100;  // must match CSS perspective

let active = ACTIVE_START;

/* ─── Render fan ────────────────────── */
function renderFan() {
  const fan = document.getElementById('fan');
  fan.innerHTML = '';

  DATA.forEach((d, i) => {
    const off   = i - active;
    const isAct = off === 0;
    const theta = off * ANGLE * (Math.PI / 180);

    // Circular arc position
    const x  = Math.sin(theta) * ARC_R;
    const z0 = (Math.cos(theta) - 1) * ARC_R; // 0 at active, negative elsewhere
    const z  = z0 + (isAct ? 115 : 0);         // active card pops forward

    const rotY  = off * ANGLE;
    const absOff = Math.abs(off);

    // Opacity — active full, nearby slightly less, far very faint
    const opacity = isAct ? 1 : Math.max(0.12, 1 - absOff * 0.085);

    /* wrapper — handles 3D position */
    const cw = document.createElement('div');
    cw.className = 'cw';
    cw.style.cssText = `
      transform: translateX(${x.toFixed(1)}px) translateZ(${z.toFixed(1)}px) rotateY(${rotY.toFixed(1)}deg);
      opacity: ${opacity.toFixed(2)};
    `;

    /* card — the visual element */
    const card = document.createElement('div');
    card.className = 'card' + (isAct ? ' active' : '');

    if (isAct) {
      card.innerHTML = `
        <div class="ac">
          <div class="ac-tag">Folder</div>
          <div class="ac-name">${d.name}</div>
          <div class="ac-date">${d.date}</div>
          <div class="ac-num">${d.p}<span class="ac-pct">%</span></div>
          <div class="ac-lbl2">completion</div>
          <div class="ac-arr">→</div>
        </div>`;
    } else {
      card.innerHTML = `
        <div class="lines">
          <div class="ln" style="width:82%"></div>
          <div class="ln" style="width:60%"></div>
          <div class="ln" style="width:95%;margin-top:4px"></div>
          <div class="ln" style="width:70%"></div>
          <div class="ln" style="width:44%"></div>
          <div class="ln" style="width:85%;margin-top:4px"></div>
          <div class="ln" style="width:52%"></div>
        </div>
        <div class="card-footer">
          <div class="av"></div><div class="av"></div>
          <div class="av-dot"></div>
        </div>
        <div class="card-lbl">${d.short}</div>`;
    }

    cw.addEventListener('click', () => { active = i; renderAll(); });
    cw.appendChild(card);
    fan.appendChild(cw);
  });
}

/* ─── Render detail ─────────────────── */
function renderDetail() {
  const d = DATA[active];
  document.getElementById('dp').innerHTML = `
    <div>
      <div class="dp-tags">
        <span class="dp-tag">Incident</span>
        <span class="dp-tag">Vendor</span>
        <span class="dp-tag">DPIA</span>
      </div>
      <div class="dp-title">${d.name}</div>
      <div class="dp-sub">Recent activity</div>
      <div class="dp-row">
        <span>Annual Data Privacy Audit</span>
        <div class="dp-track" style="max-width:220px">
          <div class="dp-fill" style="width:${d.p}%"></div>
        </div>
        <span>${d.due}</span>
      </div>
      <div class="dp-file">
        <div class="dp-fi">📄</div>
        <div>
          <div style="font-weight:500;color:rgba(255,255,255,0.85);font-size:11px">${d.doc}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.3)">${d.email}</div>
        </div>
        <div style="margin-left:auto;font-size:10px;color:rgba(255,255,255,0.25)">09:00 AM</div>
      </div>
    </div>
    <div class="dp-div"></div>
    <div class="dp-r">
      <div class="kv"><div class="kv-l">Event</div><div class="kv-v">${d.ev}</div></div>
      <div class="kv"><div class="kv-l">Deliverable Due</div><div class="kv-v">${d.due}</div></div>
      <div><div class="here"><div class="here-d"></div>We're Here</div></div>
    </div>`;
}

/* ─── Render arc guide (SVG) ─────────── */
function renderArc() {
  const stage = document.querySelector('.stage');
  const svg   = document.getElementById('arcSvg');
  if (!stage || !svg) return;
  const W = stage.offsetWidth, H = stage.offsetHeight;

  // The fan root is at (W/2 - 80, H/2) on screen
  // rotateX(-14deg) on the fan modifies Y projection
  // We approximate the arc guide using the same math + manual perspective projection

  const fanX = W / 2 - 80;
  const fanY = H / 2;
  const rx = -14 * Math.PI / 180; // fan's rotateX

  const CARD_H = 212;
  const pts = DATA.map((_, i) => {
    const off   = i - active;
    const isAct = off === 0;
    const theta = off * ANGLE * (Math.PI / 180);

    const x3  = Math.sin(theta) * ARC_R;
    const z0  = (Math.cos(theta) - 1) * ARC_R;
    const z3  = z0 + (isAct ? 115 : 0);
    const y3  = -CARD_H / 2; // top of card in card-local Y

    // Apply fan's rotateX(-14deg) to (x3, y3, z3)
    const y3r = y3 * Math.cos(rx) - z3 * Math.sin(rx);
    const z3r = y3 * Math.sin(rx) + z3 * Math.cos(rx);

    // Perspective projection
    const d  = PERSP - z3r;
    const sx = fanX + x3 * (PERSP / d);
    const sy = fanY + y3r * (PERSP / d);

    return { x: sx, y: sy };
  });

  // Build smooth bezier path
  let path = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) {
    const p = pts[i-1], c = pts[i];
    const mx = (p.x + c.x) / 2;
    const my = Math.min(p.y, c.y) - 14;
    path += ` Q ${mx.toFixed(1)} ${my.toFixed(1)} ${c.x.toFixed(1)} ${c.y.toFixed(1)}`;
  }

  const ap = pts[active];
  svg.innerHTML = `
    <defs>
      <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="rgba(34,197,94,0)"  />
        <stop offset="20%"  stop-color="rgba(34,197,94,0.35)"/>
        <stop offset="50%"  stop-color="rgba(34,197,94,0.7)" />
        <stop offset="80%"  stop-color="rgba(34,197,94,0.35)"/>
        <stop offset="100%" stop-color="rgba(34,197,94,0)"  />
      </linearGradient>
    </defs>
    <path d="${path}" fill="none" stroke="url(#ag)"
          stroke-width="1.3" stroke-dasharray="3 5" stroke-linecap="round"/>
    <circle cx="${ap.x.toFixed(1)}" cy="${ap.y.toFixed(1)}" r="4.5"
            fill="rgba(34,197,94,0.92)"/>
    <circle cx="${ap.x.toFixed(1)}" cy="${ap.y.toFixed(1)}" r="9"
            fill="none" stroke="rgba(34,197,94,0.35)" stroke-width="1.2"/>
    <circle cx="${ap.x.toFixed(1)}" cy="${ap.y.toFixed(1)}" r="15"
            fill="none" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>`;
}

function renderAll() {
  renderFan();
  renderDetail();
  renderArc();
}

/* ─── Boot ──────────────────────────── */
renderAll();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && active > 0)              { active--; renderAll(); }
  if (e.key === 'ArrowRight' && active < DATA.length-1)  { active++; renderAll(); }
});

new ResizeObserver(renderArc).observe(document.querySelector('.stage'));
</script>
</body>
</html>
