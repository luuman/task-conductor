<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>需求文档 — TaskConductor 新 IA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas-bg:#eef0f5; --card:#fff; --card-bd:#e2e6ed;
  --tx:#1e2130; --dim:#6b7280; --dim2:#9ca3af;
  --ln:#e5e7eb; --ln2:#d1d5db;
  --blue:#2563eb; --blue-lt:#dbeafe;
  --green:#10b981; --red:#ef4444; --red-lt:#fee2e2;
  --amb:#f59e0b; --amb-lt:#fef3c7;
  --pur:#8b5cf6; --pur-lt:#ede9fe;
  --arr:#adb5c8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  background:var(--canvas-bg);height:100vh;overflow:hidden;display:flex;flex-direction:column;color:var(--tx)}

/* ── HEADER ── */
.hd{height:48px;flex-shrink:0;background:#0f172a;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;padding:0 16px;gap:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.logo{font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px;
  border-right:1px solid rgba(255,255,255,.1);padding-right:14px;margin-right:14px;color:#e5e7eb;flex-shrink:0}
.logo-icon{width:24px;height:24px;background:linear-gradient(135deg,#2563eb,#7c3aed);
  border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0}
.phase-nav{display:flex;align-items:center;gap:0;flex:1;overflow:hidden}
.ph-item{display:flex;align-items:center}
.ph-lbl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;cursor:pointer;transition:all .15s}
.ph-lbl:hover{filter:brightness(.85)}
.ph-arr{font-size:9px;color:#374151;margin:0 1px;padding:0 1px}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:3px;border-left:1px solid rgba(255,255,255,.1);
  padding-left:12px;margin-left:8px;flex-shrink:0}
.tbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#9ca3af;
  border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;transition:all .1s;
  display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,.14);color:#e5e7eb}
.tbtn.active{background:rgba(37,99,235,.3);border-color:rgba(37,99,235,.5);color:#93c5fd}
.tbtn-sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 2px}
.zoom-ctrl{display:flex;align-items:center;gap:4px;border-left:1px solid rgba(255,255,255,.1);
  padding-left:12px;margin-left:4px;flex-shrink:0}
.zbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#9ca3af;
  border-radius:5px;padding:4px 9px;font-size:12px;cursor:pointer}
.zbtn:hover{background:rgba(255,255,255,.14);color:#e5e7eb}
.zval{font-size:12px;color:#6b7280;min-width:36px;text-align:center}

/* ── CANVAS ── */
.wrap{flex:1;overflow:hidden;position:relative}
.wrap.tool-select{cursor:default}
.wrap.tool-connect{cursor:crosshair}
.wrap.panning{cursor:grabbing !important}
.canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* ── GRID ── */
.wrap.grid-on{
  background-image:radial-gradient(circle,#c8cbd4 1px,transparent 1px);
  background-size:20px 20px;
}

/* ── PHASE HEADERS ── */
.ph-head{position:absolute;top:0;display:flex;align-items:center;gap:6px;white-space:nowrap}
.ph-head-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.ph-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}
.ph-vline{position:absolute;top:0;width:1px;border-left:1.5px dashed;opacity:.1}

/* ── NODE ── */
.node{position:absolute;user-select:none}
.node-lbl{font-size:10.5px;font-weight:600;color:var(--dim);text-align:center;margin-bottom:5px;letter-spacing:.01em;pointer-events:none}
.node-card{background:var(--card);border:1px solid var(--card-bd);border-radius:8px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  transition:box-shadow .15s,border-color .15s;width:280px;cursor:pointer}
.node:hover .node-card{box-shadow:0 4px 16px rgba(0,0,0,.12);border-color:#c8cbd4}
.node.sel .node-card{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.25),0 4px 16px rgba(0,0,0,.1)}
.node.dragging .node-card{box-shadow:0 12px 40px rgba(0,0,0,.2);opacity:.92}

/* ── CONNECTORS (visible in connect mode) ── */
.connector{position:absolute;width:10px;height:10px;background:#2563eb;border:2px solid #fff;
  border-radius:50%;opacity:0;transition:opacity .12s;cursor:crosshair;z-index:10}
.connector.top{left:50%;top:-5px;transform:translateX(-50%)}
.connector.right{right:-5px;top:50%;transform:translateY(-50%)}
.connector.bottom{left:50%;bottom:-5px;transform:translateX(-50%)}
.connector.left{left:-5px;top:50%;transform:translateY(-50%)}
.wrap.tool-connect .node:hover .connector{opacity:1}
.connector:hover{background:#7c3aed;transform:translateX(-50%) scale(1.3)}
.connector.right:hover,.connector.left:hover{transform:translateY(-50%) scale(1.3)}

/* ── SC elements ── */
.sc-bar{height:30px;background:#f8f9fc;border-bottom:1px solid var(--ln);display:flex;align-items:center;padding:0 10px;gap:6px}
.sc-dot{width:7px;height:7px;border-radius:50%}
.sc-title{font-size:11px;color:var(--dim);font-weight:600;margin:0 auto;letter-spacing:.02em}
.sc-body{padding:10px}
.ln{height:9px;background:var(--ln);border-radius:3px;margin:4px 0}
.ln.sm{height:8px}.ln.xs{height:6px}.ln.dark{background:var(--ln2)}
.btn{height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin:5px 0}
.btn.pri{background:var(--blue);color:#fff}.btn.sec{background:var(--ln);color:var(--dim)}
.btn.grn{background:var(--green);color:#fff}.btn.red{background:var(--red-lt);color:var(--red)}
.inp{height:22px;border:1px solid var(--ln2);border-radius:4px;background:#fafbfc;margin:4px 0;display:flex;align-items:center;padding:0 8px}
.inp.focus{border-color:var(--blue)}
.inp-txt{height:7px;background:var(--ln);border-radius:2px;width:60%}
.inp-ph{height:7px;background:var(--ln2);border-radius:2px;width:45%}
.chip{display:inline-flex;align-items:center;height:18px;border-radius:99px;padding:0 8px;font-size:9px;font-weight:700;margin:1px 2px 1px 0}
.row{display:flex;gap:5px;align-items:center;margin:3px 0}
.sep{height:1px;background:var(--ln);margin:6px 0}
.stage-box{flex:1;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700}
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:36px}
.mini-bar{flex:1;border-radius:2px 2px 0 0}
.gauge-wrap{display:flex;align-items:center;justify-content:center;padding:5px 0}
.log-line{height:10px;border-radius:2px;margin:3px 0;background:var(--ln)}
.kpi-card{background:#f8f9fc;border:1px solid var(--ln);border-radius:5px;flex:1;padding:6px 8px;text-align:center}
.option-card{background:#f8f9fc;border:1px solid var(--ln);border-radius:5px;flex:1;padding:6px;text-align:center}
.option-card.sel{background:var(--blue-lt);border-color:var(--blue)}
.list-row{display:flex;align-items:center;gap:5px;height:22px;padding:0 3px;border-bottom:1px solid var(--ln)}
.sidebar-mini{width:40px;background:#0d1117;border-right:1px solid rgba(255,255,255,.06);padding:5px 0;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.sidebar-item{height:26px;display:flex;align-items:center;justify-content:center;font-size:9px;border-radius:3px;margin:0 3px;color:#6b7280}
.sidebar-item.active{background:rgba(37,99,235,.2);color:#93c5fd}
.sidebar-item.done{color:#10b981}

/* ── SVG ARROWS ── */
.arr-path{fill:none;stroke:var(--arr);stroke-width:1.5;marker-end:url(#arrowhead);cursor:pointer;transition:stroke .15s}
.arr-path:hover{stroke:#6366f1;stroke-width:2.5}
.arr-path.sel-arrow{stroke:#2563eb;stroke-width:2.5}
.arr-path.custom{stroke:#8b5cf6}
.arr-label-bg{fill:#fff;stroke:var(--ln);stroke-width:.8}
.arr-label-txt{font-size:9px;font-family:system-ui;fill:var(--dim2)}
#temp-connect-line{stroke:#2563eb;stroke-width:1.5;stroke-dasharray:5 3;fill:none;pointer-events:none}

/* ── SELECTION BOX ── */
#sel-box{position:absolute;border:1.5px solid #2563eb;background:rgba(37,99,235,.06);
  border-radius:3px;pointer-events:none;display:none;z-index:50}

/* ── DETAIL PANEL ── */
.panel{position:fixed;right:0;top:48px;bottom:0;width:360px;background:#fff;
  border-left:1px solid var(--card-bd);box-shadow:-4px 0 16px rgba(0,0,0,.08);
  transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column;z-index:100}
.panel.open{transform:translateX(0)}
.panel-hd{padding:14px 16px 12px;border-bottom:1px solid var(--ln);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.panel-title{font-size:15px;font-weight:800;flex:1;color:var(--tx)}
.panel-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--dim2);padding:0 2px}
.panel-body{overflow-y:auto;flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.p-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim2);margin-bottom:7px}
.p-story{background:#f8f9ff;border-left:3px solid var(--blue);padding:9px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--dim);font-style:italic;line-height:1.65}
.p-story strong{color:var(--tx);font-style:normal}
.p-ac-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid var(--ln);margin-bottom:4px;font-size:11.5px;color:#374151;line-height:1.45}
.p-ac-item .ck{color:var(--green);font-weight:700;font-size:10px;flex-shrink:0;margin-top:1px}
.p-tech{background:#0f172a;border-radius:6px;padding:9px 11px;font-size:10.5px;color:#a3e635;font-family:monospace;line-height:1.7;white-space:pre}
.p-nav-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:6px;border:1px solid var(--ln);margin-bottom:4px;font-size:12px;color:var(--dim);cursor:pointer;transition:all .15s}
.p-nav-item:hover{background:#f8f9ff;border-color:#c7d2fe;color:var(--tx)}
.wf-preview-wrap{position:relative;width:100%;height:200px;overflow:hidden;border-radius:8px;border:1px solid var(--ln);background:#f3f4f6}
.wf-preview-wrap iframe{width:1440px;height:900px;border:none;transform:scale(0.218);transform-origin:0 0;pointer-events:none}

/* ── CONTEXT MENU ── */
#ctx-menu{position:fixed;background:#fff;border:1px solid var(--card-bd);border-radius:9px;
  box-shadow:0 8px 32px rgba(0,0,0,.14);padding:5px;z-index:500;display:none;min-width:160px}
.ctx-item{padding:7px 12px;font-size:12.5px;color:#374151;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;gap:8px;font-weight:500}
.ctx-item:hover{background:#f3f4f6}
.ctx-item.danger{color:#ef4444}
.ctx-item.danger:hover{background:#fef2f2}
.ctx-sep{height:1px;background:var(--ln);margin:4px 0}
.ctx-label{font-size:10px;font-weight:700;color:#9ca3af;padding:4px 12px 2px;text-transform:uppercase;letter-spacing:.07em}

/* ── MINI MAP ── */
#minimap{position:fixed;bottom:16px;right:16px;width:160px;height:100px;
  background:rgba(15,23,42,.85);border:1px solid rgba(255,255,255,.1);border-radius:8px;
  overflow:hidden;z-index:150;backdrop-filter:blur(4px)}
#minimap canvas{width:100%;height:100%}
#minimap-vp{position:absolute;border:1.5px solid #2563eb;background:rgba(37,99,235,.08);border-radius:2px;pointer-events:none}
.minimap-toggle{position:fixed;bottom:124px;right:16px;background:rgba(15,23,42,.85);
  border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#6b7280;font-size:11px;
  padding:4px 8px;cursor:pointer;z-index:151}
.minimap-toggle:hover{color:#e5e7eb}

/* ── TOAST ── */
#toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#0f172a;color:#e5e7eb;padding:7px 14px;border-radius:8px;font-size:12px;
  opacity:0;transition:all .2s;pointer-events:none;z-index:600;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SHORTCUTS HINT ── */
#shortcuts{position:fixed;bottom:16px;left:16px;font-size:10.5px;color:#6b7280;line-height:1.7;
  background:rgba(15,23,42,.7);padding:8px 12px;border-radius:7px;backdrop-filter:blur(4px)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:99px}
</style>
</head>
<body>

<div class="hd">
  <div class="logo">
    <div class="logo-icon">TC</div>
    TaskConductor
    <span style="font-size:10px;background:rgba(37,99,235,.2);color:#93c5fd;padding:2px 8px;border-radius:99px;font-weight:700;flex-shrink:0">需求文档</span>
  </div>
  <div class="phase-nav" id="phase-nav"></div>

  <div class="toolbar">
    <button class="tbtn active" id="t-select" onclick="setTool('select')" title="选择 (V)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7-3-17z"/></svg> 选择
    </button>
    <button class="tbtn" id="t-connect" onclick="setTool('connect')" title="连线 (C)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg> 连线
    </button>
    <div class="tbtn-sep"></div>
    <button class="tbtn" id="t-grid" onclick="toggleGrid()" title="网格 (G)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="tbtn" id="t-snap" onclick="toggleSnap()" title="吸附网格">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
    </button>
    <div class="tbtn-sep"></div>
    <button class="tbtn" onclick="addStickyNote()" title="便签 (N)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> 便签
    </button>
    <button class="tbtn" onclick="resetLayout()" title="重置位置">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>

  <div class="zoom-ctrl">
    <button class="zbtn" onclick="Z(-0.12)">−</button>
    <span class="zval" id="zval">72%</span>
    <button class="zbtn" onclick="Z(0.12)">+</button>
    <button class="zbtn" onclick="R()">重置</button>
  </div>
</div>

<div class="wrap grid-on tool-select" id="wrap">
  <div class="canvas" id="canvas">
    <svg id="svgL" style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none">
      <defs>
        <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L7,3 z" fill="#adb5c8"/>
        </marker>
        <marker id="arrowhead-blue" markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L7,3 z" fill="#2563eb"/>
        </marker>
        <marker id="arrowhead-purple" markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L7,3 z" fill="#8b5cf6"/>
        </marker>
      </defs>
      <line id="temp-connect-line" x1="0" y1="0" x2="0" y2="0" style="display:none"/>
    </svg>
  </div>
  <div id="sel-box"></div>
</div>

<div class="panel" id="panel">
  <div class="panel-hd">
    <div>
      <div class="panel-title" id="p-title">—</div>
      <div style="font-size:11px;margin-top:3px" id="p-phase">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="p-body"></div>
</div>

<div id="ctx-menu"></div>

<div id="minimap">
  <canvas id="mm-canvas" width="320" height="200"></canvas>
  <div id="minimap-vp"></div>
</div>
<button class="minimap-toggle" onclick="document.getElementById('minimap').style.display=document.getElementById('minimap').style.display==='none'?'block':'none'">迷你地图</button>

<div id="toast"></div>

<div id="shortcuts">
  <b style="color:#e5e7eb">快捷键</b><br>
  V 选择 · C 连线 · G 网格<br>
  Delete 删除 · Esc 取消选择<br>
  Cmd+A 全选 · 右键 菜单
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════

const PHASES = [
  {id:1, label:'① 入口',       color:'#6366f1', bg:'#eef2ff'},
  {id:2, label:'② 项目工作区', color:'#2563eb', bg:'#dbeafe'},
  {id:3, label:'③ PRD 访谈',   color:'#06b6d4', bg:'#cffafe'},
  {id:4, label:'④ 阶段状态机', color:'#f59e0b', bg:'#fef3c7'},
  {id:5, label:'⑤ 管理中心',   color:'#10b981', bg:'#d1fae5'},
  {id:6, label:'⑥ 插件系统',   color:'#8b5cf6', bg:'#ede9fe'},
];

const DETAILS = {
  entry:{ph:1,title:'应用入口',
    story:'作为用户，打开应用时希望自动进入最近的工作状态，无需每次从首页导航。',
    ac:['检查 localStorage 中的 lastProjectId','有历史项目：直接进入该项目「项目概览」','无历史项目：进入「新建项目引导」','PWA 启动画面 1.5s 渐入过渡'],
    tech:'GET /api/projects?limit=1&sort=lastOpenedAt\n→ 有: navigate(/projects/{id})\n→ 无: navigate(/onboarding)',
    wf:null,
    nav:[{l:'→ 有项目', to:'n-proj'},{l:'→ 无项目', to:'n-onboard'}]},

  onboard:{ph:1,title:'新建项目引导',
    story:'作为新用户，我希望通过友好的向导快速创建第一个项目，立即感受到平台价值。',
    ac:['填写项目名称（2-50字，必填）+ 简介','创建后自动进入 PRD 访谈流程','侧边展示「接下来会发生什么」步骤预览','欢迎 Toast：「AI 正在准备 PRD 访谈…」'],
    tech:'POST /api/projects {name, description}\n→ {id, name, status:"input"}\nnav: /projects/{id}/prd',
    wf:'/wireframes/wireframe-project-overview.html',
    nav:[{l:'✓ 创建→PRD 访谈', to:'n-prd'},{l:'← 已有项目', to:'n-proj'}]},

  proj:{ph:2,title:'项目工作区（概览）',
    story:'作为项目负责人，我希望有一个以项目为核心的工作台，清晰展示当前进度和最紧急待办。',
    ac:['左侧固定侧边栏（224px）：Logo+项目切换器+阶段导航+管理中心','项目概览：阶段时间线+当前阶段详情+统计+活动流','当前阶段显示醒目状态横幅（AI执行中/待审批/完成）','面板支持拖拽调整宽度（VSCode式 resize handle）','侧边栏底部「管理中心」进入独立全屏页面'],
    tech:'GET /api/projects/{id}\nGET /api/projects/{id}/stages',

// ══════════════════════════════════════════
// CANVAS STATE
// ══════════════════════════════════════════

let scale=0.72, tx=40, ty=60;
let currentTool='select';
let showGridFlag=true;
let snapEnabled=false;
const GRID_SIZE=20;

let selectedNodeIds=new Set();
let hoveredArrowIdx=null;
let selectedArrowIdx=null;

// Mutable arrows
let arrows=[...DEFAULT_ARROWS];
let deletedBuiltinArrows=new Set();
let customArrows=[];

// Node positions (mutable)
let nodePos={};

// Pan state
let isPanning=false, panStartX=0, panStartY=0;

// Drag state
let isDragging=false;
let dragInitPos={};

// Selection box
let isSelecting=false;
let selStartX=0, selStartY=0;

// Connect tool
let connectFrom=null; // {id, side, x, y}

// Load saved state
function loadState(){
  try{
    const saved=localStorage.getItem('tc-req-pos');
    if(saved) nodePos=JSON.parse(saved);
    const savedArrows=localStorage.getItem('tc-req-arrows');
    if(savedArrows){ const d=JSON.parse(savedArrows); deletedBuiltinArrows=new Set(d.deleted||[]); customArrows=d.custom||[]; }
  }catch(e){}
  NODES.forEach(n=>{ if(!nodePos[n.id]) nodePos[n.id]={...DEFAULT_POS[n.id]}; });
}

function saveState(){
  localStorage.setItem('tc-req-pos', JSON.stringify(nodePos));
  localStorage.setItem('tc-req-arrows', JSON.stringify({deleted:[...deletedBuiltinArrows], custom:customArrows}));
}

// ══════════════════════════════════════════
// BUILD NODES
// ══════════════════════════════════════════

function buildNodes(){
  const canvas=document.getElementById('canvas');
  NODES.forEach(n=>{
    const wrapper=document.createElement('div');
    wrapper.className='node';
    wrapper.id=n.id;
    const pos=nodePos[n.id]||DEFAULT_POS[n.id];
    wrapper.style.cssText=`left:${pos.x}px;top:${pos.y}px`;

    const lbl=document.createElement('div');
    lbl.className='node-lbl'; lbl.textContent=n.label;
    wrapper.appendChild(lbl);

    const card=document.createElement('div');
    card.className='node-card';
    const bar=document.createElement('div');
    bar.className='sc-bar';
    bar.innerHTML=`<div class="sc-dot" style="background:#ef4444"></div><div class="sc-dot" style="background:#f59e0b"></div><div class="sc-dot" style="background:#22c55e"></div><div class="sc-title">${n.label}</div>`;
    card.appendChild(bar);
    card.insertAdjacentHTML('beforeend', WF[n.key]());

    // Connectors for connect tool
    ['top','right','bottom','left'].forEach(side=>{
      const c=document.createElement('div');
      c.className=`connector ${side}`;
      c.addEventListener('mousedown',e=>{
        e.stopPropagation(); e.preventDefault();
        if(currentTool==='connect') startConnect(n.id, side, e);
      });
      wrapper.appendChild(c);
    });

    wrapper.appendChild(card);

    // Drag + click handler
    wrapper.addEventListener('mousedown', e=>{
      if(e.button!==0) return;
      if(e.target.classList.contains('connector')) return;

      if(currentTool==='connect'){
        e.stopPropagation();
        const rect=wrapper.getBoundingClientRect();
        startConnectFromCenter(n.id, e);
        return;
      }

      e.stopPropagation();

      // Selection
      if(!e.shiftKey && !selectedNodeIds.has(n.id)){
        clearSelection();
        selectNode(n.id);
      } else if(e.shiftKey){
        if(selectedNodeIds.has(n.id)) deselectNode(n.id);
        else selectNode(n.id);
      } else if(!selectedNodeIds.has(n.id)){
        selectNode(n.id);
      }

      // Record positions for drag
      const clickX=e.clientX, clickY=e.clientY;
      let moved=false;
      dragInitPos={};
      for(const id of selectedNodeIds){
        dragInitPos[id]={x:nodePos[id].x, y:nodePos[id].y};
      }
      if(!dragInitPos[n.id]) dragInitPos[n.id]={x:nodePos[n.id].x, y:nodePos[n.id].y};

      function onMove(ev){
        const dx=(ev.clientX-clickX)/scale;
        const dy=(ev.clientY-clickY)/scale;
        if(!moved && Math.sqrt(dx*dx+dy*dy)>4){
          moved=true;
          wrapper.classList.add('dragging');
          document.body.style.userSelect='none';
        }
        if(moved){
          for(const id of Object.keys(dragInitPos)){
            let nx=dragInitPos[id].x+dx;
            let ny=dragInitPos[id].y+dy;
            if(snapEnabled){ nx=Math.round(nx/GRID_SIZE)*GRID_SIZE; ny=Math.round(ny/GRID_SIZE)*GRID_SIZE; }
            nodePos[id]={x:nx, y:ny};
            const el=document.getElementById(id);
            if(el){ el.style.left=nx+'px'; el.style.top=ny+'px'; }
          }
          drawArrows();
          updateMinimap();
        }
      }

      function onUp(){
        window.removeEventListener('mousemove',onMove);
        window.removeEventListener('mouseup',onUp);
        wrapper.classList.remove('dragging');
        document.body.style.userSelect='';
        if(!moved) showPanel(n.key, n.id);
        else saveState();
      }

      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    // Right-click
    wrapper.addEventListener('contextmenu', e=>{
      e.preventDefault();
      showContextMenu(e.clientX, e.clientY, 'node', n);
    });

    canvas.appendChild(wrapper);
  });

  // Sticky notes (loaded from storage)
  const notes=JSON.parse(localStorage.getItem('tc-notes')||'[]');
  notes.forEach(note=>createStickyNoteEl(note.id, note.x, note.y, note.text, note.color));

  buildPhaseHeaders();
}

function buildPhaseHeaders(){
  const canvas=document.getElementById('canvas');
  const phaseX={1:24,2:250,3:490,4:730,5:970,6:1210};
  PHASES.forEach(ph=>{
    const x=phaseX[ph.id]; if(!x) return;
    const el=document.createElement('div');
    el.className='ph-head';
    el.style.cssText=`left:${x}px`;
    el.innerHTML=`<div class="ph-head-lbl" style="color:${ph.color}">
      <div class="ph-num" style="background:${ph.bg};color:${ph.color}">${ph.id}</div>
      ${ph.label.slice(2)}</div>`;
    canvas.appendChild(el);
    if(ph.id<6){
      const vl=document.createElement('div');
      vl.className='ph-vline';
      const nx=phaseX[ph.id+1];
      vl.style.cssText=`left:${nx-8}px;height:750px;border-color:${ph.color}`;
      canvas.appendChild(vl);
    }
  });
}

// ══════════════════════════════════════════
// DRAW ARROWS
// ══════════════════════════════════════════

function getEdgePt(id, side, frac){
  const el=document.getElementById(id); if(!el) return {x:0,y:0};
  const pos=nodePos[id]||{x:0,y:0};
  const w=el.offsetWidth, h=el.offsetHeight;
  switch(side){
    case'r': return{x:pos.x+w, y:pos.y+h*frac};
    case'l': return{x:pos.x,   y:pos.y+h*frac};
    case't': return{x:pos.x+w*frac, y:pos.y};
    case'b': return{x:pos.x+w*frac, y:pos.y+h};
    default: return{x:pos.x+w/2, y:pos.y+h/2};
  }
}

function drawArrowPath(svg, a, idx, isCustom=false){
  const p1=getEdgePt(a.f, a.fx||'r', a.fy||0.5);
  const p2=getEdgePt(a.t, a.tx||'l', a.ty||0.5);
  if(!p1||!p2||(!p1.x&&!p1.y)) return;
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  let cx1=p1.x,cy1=p1.y,cx2=p2.x,cy2=p2.y;
  if(a.curve==='up'){const m=Math.min(p1.y,p2.y)-55;cx1=p1.x;cy1=m;cx2=p2.x;cy2=m;}
  else if(a.curve==='left'){const m=Math.min(p1.x,p2.x)-55;cx1=m;cy1=p1.y;cx2=m;cy2=p2.y;}
  else if((a.fx||'r')==='r'||(a.fx||'r')==='l'){cx1=p1.x+dx*.45;cy1=p1.y;cx2=p2.x-dx*.45;cy2=p2.y;}
  else{cx1=p1.x;cy1=p1.y+dy*.45;cx2=p2.x;cy2=p2.y-dy*.45;}

  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  const isSel=(isCustom ? selectedArrowIdx===`c${idx}` : selectedArrowIdx===idx);
  path.setAttribute('class',`arr-path${isCustom?' custom':''}${isSel?' sel-arrow':''}`);
  path.setAttribute('d',`M${p1.x},${p1.y} C${cx1},${cy1} ${cx2},${cy2} ${p2.x},${p2.y}`);
  path.setAttribute('marker-end',`url(#arrowhead${isSel?'-blue':isCustom?'-purple':''})`);
  path.style.pointerEvents='stroke';
  const key=isCustom?`c${idx}`:idx;
  path.addEventListener('click', e=>{ e.stopPropagation(); selectedArrowIdx=isSel?null:key; drawArrows(); });
  svg.appendChild(path);

  if(a.lb){
    const mx=(p1.x+p2.x)/2+(cx1+cx2)/2*.1;
    const my=(p1.y+p2.y)/2+(cy1+cy2)/2*.1;
    const rw=a.lb.length*5+8;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('class','arr-label-bg');
    bg.setAttribute('x',mx-rw/2); bg.setAttribute('y',my-8); bg.setAttribute('width',rw); bg.setAttribute('height',14); bg.setAttribute('rx',3);
    svg.appendChild(bg);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('class','arr-label-txt'); txt.setAttribute('x',mx); txt.setAttribute('y',my+2); txt.setAttribute('text-anchor','middle');
    txt.textContent=a.lb; svg.appendChild(txt);
  }
}

function drawArrows(){
  const svg=document.getElementById('svgL');
  const tempLine=document.getElementById('temp-connect-line');
  const defs=svg.querySelector('defs');
  while(svg.lastChild && svg.lastChild!==defs && svg.lastChild!==tempLine) svg.removeChild(svg.lastChild);

  DEFAULT_ARROWS.forEach((a,i)=>{ if(!deletedBuiltinArrows.has(i)) drawArrowPath(svg,a,i,false); });
  customArrows.forEach((a,i)=>drawArrowPath(svg,a,i,true));
}

// ══════════════════════════════════════════
// CONNECT TOOL
// ══════════════════════════════════════════

function startConnect(nodeId, side, e){
  connectFrom={nodeId, side};
  const el=document.getElementById(nodeId);
  const w=el.offsetWidth, h=el.offsetHeight;
  const pos=nodePos[nodeId];
  let sx=pos.x, sy=pos.y;
  if(side==='r'){sx+=w; sy+=h*.5;}
  else if(side==='l'){sy+=h*.5;}
  else if(side==='t'){sx+=w*.5;}
  else if(side==='b'){sx+=w*.5; sy+=h;}
  connectFrom.sx=sx; connectFrom.sy=sy;

  const tl=document.getElementById('temp-connect-line');
  tl.setAttribute('x1',sx); tl.setAttribute('y1',sy);
  tl.setAttribute('x2',sx); tl.setAttribute('y2',sy);
  tl.style.display='block';
}

function startConnectFromCenter(nodeId, e){
  const pos=nodePos[nodeId];
  const el=document.getElementById(nodeId);
  const w=el.offsetWidth, h=el.offsetHeight;
  connectFrom={nodeId, side:'r', sx:pos.x+w, sy:pos.y+h*.5};
  const tl=document.getElementById('temp-connect-line');
  tl.setAttribute('x1',connectFrom.sx); tl.setAttribute('y1',connectFrom.sy);
  tl.setAttribute('x2',connectFrom.sx); tl.setAttribute('y2',connectFrom.sy);
  tl.style.display='block';
}

function updateTempLine(e){
  if(!connectFrom) return;
  const wrap=document.getElementById('wrap');
  const r=wrap.getBoundingClientRect();
  const cx=(e.clientX-r.left-tx)/scale;
  const cy=(e.clientY-r.top-ty)/scale;
  const tl=document.getElementById('temp-connect-line');
  tl.setAttribute('x2',cx); tl.setAttribute('y2',cy);
}

function finishConnect(targetId){
  if(!connectFrom || connectFrom.nodeId===targetId) { cancelConnect(); return; }
  const newArrow={f:connectFrom.nodeId, t:targetId, lb:'', fx:'r',fy:.5,tx:'l',ty:.5};
  customArrows.push(newArrow); saveState();
  cancelConnect(); drawArrows();
  toast('已创建连线');
}

function cancelConnect(){
  connectFrom=null;
  const tl=document.getElementById('temp-connect-line');
  tl.style.display='none';
}

function selectNode(id){
  selectedNodeIds.add(id);
  document.getElementById(id)?.classList.add('sel');
}
function deselectNode(id){
  selectedNodeIds.delete(id);
  document.getElementById(id)?.classList.remove('sel');
}
function clearSelection(){
  selectedNodeIds.forEach(id=>document.getElementById(id)?.classList.remove('sel'));
  selectedNodeIds.clear();

}
function selectAll(){

// ══════════════════════════════════════════

function showContextMenu(x, y, type, data){
  const menu=document.getElementById('ctx-menu');
  let html='';

  if(type==='node'){
    html=`<div class="ctx-label">${data.label}</div>
      <div class="ctx-item" onclick="duplicateNode('${data.id}');hideCtx()">⧉ 复制节点</div>
      <div class="ctx-item" onclick="jumpTo('${data.id}');hideCtx()">🔍 居中定位</div>
      <div class="ctx-sep"></div>
      <div class="ctx-item" onclick="connectFromNode('${data.id}');hideCtx()">→ 从此节点连线</div>
      <div class="ctx-sep"></div>
      <div class="ctx-item danger" onclick="deleteSelected();hideCtx()">🗑 删除节点</div>`;
  } else if(type==='arrow'){
    html=`<div class="ctx-label">连线</div>
      <div class="ctx-item danger" onclick="deleteSelectedArrow();hideCtx()">🗑 删除连线</div>`;
  } else {
    html=`<div class="ctx-item" onclick="addStickyNote(ctxPos.x, ctxPos.y);hideCtx()">📝 添加便签</div>
      <div class="ctx-item" onclick="resetLayout();hideCtx()">↺ 重置所有位置</div>
      <div class="ctx-sep"></div>
      <div class="ctx-item" onclick="selectAll();hideCtx()">⊞ 全选 (⌘A)</div>
      <div class="ctx-item" onclick="clearSelection();hideCtx()">✕ 取消选择</div>`;
  }

  menu.innerHTML=html;
  const mw=200, mh=menu.scrollHeight||120;
  const lx=Math.min(x, window.innerWidth-mw-8);
  const ly=Math.min(y, window.innerHeight-mh-8);
  menu.style.cssText=`left:${lx}px;top:${ly}px;display:block`;
  ctxPos={x:(x-tx)/scale, y:(y-ty)/scale};
}
let ctxPos={x:0,y:0};
function hideCtx(){ document.getElementById('ctx-menu').style.display='none'; }

function deleteSelected(){
  if(selectedNodeIds.size===0 && selectedArrowIdx===null){ toast('请先选中节点'); return; }
  selectedNodeIds.forEach(id=>{
    document.getElementById(id)?.remove();
    const ni=NODES.findIndex(n=>n.id===id);
    if(ni>=0) NODES.splice(ni,1);
    delete nodePos[id];
  });
  selectedNodeIds.clear();
  saveState(); drawArrows(); updateMinimap(); toast('已删除');
}

function deleteSelectedArrow(){
  if(selectedArrowIdx===null) return;
  if(typeof selectedArrowIdx==='string' && selectedArrowIdx.startsWith('c')){
    const i=parseInt(selectedArrowIdx.slice(1));
    customArrows.splice(i,1);
  } else {
    deletedBuiltinArrows.add(selectedArrowIdx);
  }
  selectedArrowIdx=null; saveState(); drawArrows(); toast('连线已删除');
}

function duplicateNode(id){
  const n=NODES.find(n=>n.id===id); if(!n) return;
  const newId=n.id+'_copy'+Date.now();
  const newN={...n, id:newId, label:n.label+' (副本)'};
  NODES.push(newN);
  nodePos[newId]={x:(nodePos[id]?.x||0)+20, y:(nodePos[id]?.y||0)+20};
  // rebuild just this node
  const canvas=document.getElementById('canvas');
  const wrapper=document.createElement('div');
  wrapper.className='node'; wrapper.id=newN.id;
  wrapper.style.cssText=`left:${nodePos[newId].x}px;top:${nodePos[newId].y}px`;
  const lbl=document.createElement('div'); lbl.className='node-lbl'; lbl.textContent=newN.label;
  wrapper.appendChild(lbl);
  const card=document.createElement('div'); card.className='node-card';
  const bar=document.createElement('div'); bar.className='sc-bar';
  bar.innerHTML=`<div class="sc-dot" style="background:#ef4444"></div><div class="sc-dot" style="background:#f59e0b"></div><div class="sc-dot" style="background:#22c55e"></div><div class="sc-title">${newN.label}</div>`;
  card.appendChild(bar);
  card.insertAdjacentHTML('beforeend', WF[n.key]());
  wrapper.appendChild(card);
  wrapper.addEventListener('mousedown', e=>{ e.stopPropagation(); showPanel(n.key, newN.id); });
  canvas.appendChild(wrapper);
  saveState(); updateMinimap(); toast('节点已复制');
}

function connectFromNode(id){
  setTool('connect'); toast('在目标节点上松开鼠标以创建连线');
  const pos=nodePos[id];
  const el=document.getElementById(id);
  connectFrom={nodeId:id, side:'r', sx:pos.x+(el?.offsetWidth||160), sy:pos.y+(el?.offsetHeight||140)*.5};
  const tl=document.getElementById('temp-connect-line');
  tl.setAttribute('x1',connectFrom.sx); tl.setAttribute('y1',connectFrom.sy);
  tl.setAttribute('x2',connectFrom.sx); tl.setAttribute('y2',connectFrom.sy);
  tl.style.display='block';
}

let noteCounter=0;
function addStickyNote(cx, cy){
  const id='note-'+(++noteCounter);
  const x=cx||((-tx+300)/scale);
  const y=cy||((-ty+200)/scale);
  const colors=['#fef9c3','#dbeafe','#d1fae5','#fce7f3','#ede9fe'];
  const color=colors[noteCounter%colors.length];
  createStickyNoteEl(id, x, y, '双击编辑便签', color);
  saveNotes(); updateMinimap();
}

function createStickyNoteEl(id, x, y, text, color){
  const canvas=document.getElementById('canvas');
  const note=document.createElement('div');
  note.id=id;
  note.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:140px;min-height:80px;background:${color};border-radius:8px;padding:10px;font-size:12px;color:#374151;box-shadow:2px 3px 8px rgba(0,0,0,.12);cursor:grab;user-select:none;border:1px solid rgba(0,0,0,.05);z-index:5`;
  note.textContent=text;
  note.style.fontFamily='inherit';

  // Drag
  note.addEventListener('mousedown',e=>{
    if(e.target===note && e.detail===2) return; // dblclick to edit
    e.stopPropagation();
    const startX=e.clientX, startY=e.clientY;
    const ox=parseFloat(note.style.left), oy=parseFloat(note.style.top);
    let moved=false;
    function onMove(ev){
      const dx=(ev.clientX-startX)/scale, dy=(ev.clientY-startY)/scale;
      if(!moved && Math.sqrt(dx*dx+dy*dy)>4){ moved=true; note.style.cursor='grabbing'; }
      if(moved){ note.style.left=(ox+dx)+'px'; note.style.top=(oy+dy)+'px'; }
    }
    function onUp(){ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); note.style.cursor='grab'; if(moved) saveNotes(); }
    window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
  });

  // Double click to edit
  note.addEventListener('dblclick',e=>{
    e.stopPropagation();
    note.contentEditable='true';
    note.focus();
    note.style.cursor='text';
    const onBlur=()=>{ note.contentEditable='false'; note.style.cursor='grab'; saveNotes(); note.removeEventListener('blur',onBlur); };
    note.addEventListener('blur',onBlur);
  });

  // Right-click to delete
  note.addEventListener('contextmenu',e=>{
    e.preventDefault();
    if(confirm('删除这个便签？')){ note.remove(); saveNotes(); }
  });

  canvas.appendChild(note);
}

function saveNotes(){
  const canvas=document.getElementById('canvas');
  const notes=[];
  canvas.querySelectorAll('[id^="note-"]').forEach(n=>{
    notes.push({id:n.id, x:parseFloat(n.style.left), y:parseFloat(n.style.top), text:n.textContent, color:n.style.background});
  });
  localStorage.setItem('tc-notes', JSON.stringify(notes));
}

function setTool(t){

  document.querySelectorAll('.tbtn[id^="t-"]').forEach(b=>b.classList.remove('active'));

function toggleGrid(){

function toggleSnap(){

function resetLayout(){

  NODES.forEach(n=>{ nodePos[n.id]={...DEFAULT_POS[n.id]}; const el=document.getElementById(n.id); if(el){el.style.left=nodePos[n.id].x+'px';el.style.top=nodePos[n.id].y+'px';} });

// ══════════════════════════════════════════
// PAN / ZOOM
// ══════════════════════════════════════════

function applyT(){
  const canvas=document.getElementById('canvas');
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zval').textContent=Math.round(scale*100)+'%';
  const wrap=document.getElementById('wrap');
  if(showGridFlag){
    const gs=GRID_SIZE*scale;
    wrap.style.backgroundSize=`${gs}px ${gs}px`;
    wrap.style.backgroundPosition=`${((tx%gs)+gs)%gs}px ${((ty%gs)+gs)%gs}px`;
  }
  updateMinimap();
}

function Z(d,cx,cy){
  const wrap=document.getElementById('wrap');
  const ox=cx??wrap.clientWidth/2, oy=cy??wrap.clientHeight/2;
  const ns=Math.min(3,Math.max(0.15,scale+d));
  tx=ox-(ox-tx)*(ns/scale); ty=oy-(oy-ty)*(ns/scale); scale=ns; applyT();
}
function R(){ scale=0.72; tx=40; ty=60; applyT(); }

// ══════════════════════════════════════════
// WRAP EVENTS
// ══════════════════════════════════════════

const wrap=document.getElementById('wrap');

wrap.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  hideCtx();
  if(e.target.closest('.node') || e.target.closest('[id^="note-"]')) return;

  if(currentTool==='connect'){
    if(connectFrom){ cancelConnect(); } return;
  }

  if(currentTool==='select'){
    // Selection box
    clearSelection();
    const r=wrap.getBoundingClientRect();
    selStartX=e.clientX-r.left; selStartY=e.clientY-r.top;
    isSelecting=true;
    const box=document.getElementById('sel-box');
    box.style.cssText=`display:block;left:${selStartX}px;top:${selStartY}px;width:0;height:0`;
  } else {
    // Pan
    isPanning=true; panStartX=e.clientX-tx; panStartY=e.clientY-ty;
    wrap.classList.add('panning');
  }
});

window.addEventListener('mousemove',e=>{
  if(isPanning){ tx=e.clientX-panStartX; ty=e.clientY-panStartY; applyT(); }

  if(isSelecting){
    const r=wrap.getBoundingClientRect();
    const cx=e.clientX-r.left, cy=e.clientY-r.top;
    const x=Math.min(cx,selStartX), y=Math.min(cy,selStartY);
    const w=Math.abs(cx-selStartX), h=Math.abs(cy-selStartY);
    const box=document.getElementById('sel-box');
    box.style.left=x+'px'; box.style.top=y+'px'; box.style.width=w+'px'; box.style.height=h+'px';
  }

  if(connectFrom) updateTempLine(e);
});

window.addEventListener('mouseup',e=>{
  if(isPanning){ isPanning=false; wrap.classList.remove('panning'); }

  if(isSelecting){
    isSelecting=false;
    document.getElementById('sel-box').style.display='none';
    // Select nodes in box
    const box=document.getElementById('sel-box');
    const bx=parseFloat(box.style.left), by=parseFloat(box.style.top);
    const bw=parseFloat(box.style.width), bh=parseFloat(box.style.height);
    if(bw>4 && bh>4){
      NODES.forEach(n=>{
        const el=document.getElementById(n.id); if(!el) return;
        const pos=nodePos[n.id];
        const nx=(pos.x*scale+tx), ny=(pos.y*scale+ty);
        if(nx>=bx&&nx<=bx+bw&&ny>=by&&ny<=by+bh) selectNode(n.id);
      });
    }
  }

  if(connectFrom && e.target.closest('.node')){
    const nodeEl=e.target.closest('.node');
    finishConnect(nodeEl.id);
  } else if(connectFrom){
    cancelConnect();
  }
});

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  Z(e.deltaY<0?.1:-.1, e.clientX-r.left, e.clientY-r.top);
},{passive:false});

wrap.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(e.target.closest('.node')||e.target.closest('[id^="note-"]')) return;
  showContextMenu(e.clientX, e.clientY, 'canvas', null);
});

document.addEventListener('click', e=>{ if(!e.target.closest('#ctx-menu')) hideCtx(); });

// ══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════

document.addEventListener('keydown',e=>{
  if(e.target.contentEditable==='true' || e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;

  if(e.key==='v'||e.key==='V') setTool('select');
  if(e.key==='c'||e.key==='C') setTool('connect');
  if(e.key==='g'||e.key==='G') toggleGrid();
  if(e.key==='n'||e.key==='N') addStickyNote();
  if(e.key==='Escape'){ clearSelection(); cancelConnect(); closePanel(); hideCtx(); }
  if((e.key==='Delete'||e.key==='Backspace')&&!e.metaKey){
    e.preventDefault();
    if(selectedArrowIdx!==null) deleteSelectedArrow();
    else if(selectedNodeIds.size>0) deleteSelected();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='a'){ e.preventDefault(); selectAll(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='d'){
    e.preventDefault();
    selectedNodeIds.forEach(id=>duplicateNode(id));
  }
});

// ══════════════════════════════════════════
// MINI-MAP
// ══════════════════════════════════════════

function updateMinimap(){
  const mm=document.getElementById('mm-canvas');
  const ctx=mm.getContext('2d');
  const W=mm.width, H=mm.height;
  ctx.clearRect(0,0,W,H);

  // Find bounds
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  NODES.forEach(n=>{
    const p=nodePos[n.id]; if(!p) return;
    minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+170); maxY=Math.max(maxY,p.y+160);
  });
  if(minX===Infinity) return;
  const pad=20;
  const bw=maxX-minX+pad*2, bh=maxY-minY+pad*2;
  const mmScale=Math.min(W/bw, H/bh);

  function toMM(x,y){ return{x:(x-minX+pad)*mmScale, y:(y-minY+pad)*mmScale}; }

  // Draw arrows
  ctx.strokeStyle='rgba(173,181,200,.5)'; ctx.lineWidth=1;
  DEFAULT_ARROWS.forEach((a,i)=>{
    if(deletedBuiltinArrows.has(i)) return;
    const from=nodePos[a.f]; const to=nodePos[a.t]; if(!from||!to) return;
    const p1=toMM(from.x+85, from.y+70);
    const p2=toMM(to.x+85, to.y+70);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  });

  // Draw nodes
  const phColors={'n-entry':'#6366f1','n-onboard':'#6366f1','n-proj':'#2563eb','n-stages':'#2563eb',
    'n-prd':'#06b6d4','n-prddoc':'#06b6d4','n-aiwork':'#f59e0b','n-approve':'#f59e0b','n-retry':'#f59e0b',
    'n-mgmt':'#10b981','n-projects':'#10b981','n-monitor':'#10b981',
    'n-layout':'#8b5cf6','n-plugin':'#8b5cf6','n-pluginapi':'#8b5cf6'};

  NODES.forEach(n=>{
    const p=nodePos[n.id]; if(!p) return;
    const mm=toMM(p.x, p.y);
    const w=170*mmScale, h=160*mmScale;
    ctx.fillStyle=selectedNodeIds.has(n.id)?'rgba(37,99,235,.3)':'rgba(255,255,255,.12)';
    ctx.strokeStyle=phColors[n.id]||'#6b7280';
    ctx.lineWidth=selectedNodeIds.has(n.id)?2:0.8;
    ctx.beginPath(); ctx.roundRect(mm.x,mm.y,w,h,2);
    ctx.fill(); ctx.stroke();
  });

  // Viewport indicator
  const wrap=document.getElementById('wrap');
  const vpW=wrap.clientWidth, vpH=wrap.clientHeight;
  const vpX=(-tx/scale-minX+pad)*mmScale;
  const vpY=(-ty/scale-minY+pad)*mmScale;
  const vpW2=(vpW/scale)*mmScale, vpH2=(vpH/scale)*mmScale;
  const vp=document.getElementById('minimap-vp');
  vp.style.cssText=`left:${vpX}px;top:${vpY}px;width:${vpW2}px;height:${vpH2}px`;
}

// Click on minimap to navigate
document.getElementById('mm-canvas').addEventListener('click',e=>{
  const mm=document.getElementById('mm-canvas');
  const r=mm.getBoundingClientRect();
  // rough center navigation
  const fx=(e.clientX-r.left)/r.width;
  const fy=(e.clientY-r.top)/r.height;
  const wrap=document.getElementById('wrap');
  // find approx canvas center from click ratio
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  NODES.forEach(n=>{ const p=nodePos[n.id]; if(!p) return; minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x+170);maxY=Math.max(maxY,p.y+160); });
  const bw=maxX-minX+40, bh=maxY-minY+40;
  const cx=minX-20+fx*bw, cy=minY-20+fy*bh;
  tx=wrap.clientWidth/2-cx*scale; ty=wrap.clientHeight/2-cy*scale; applyT();
});

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
