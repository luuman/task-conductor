<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>User Flow — TaskConductor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas-bg:#eef0f5;
  --card:#fff;--card-bd:#e2e6ed;
  --tx:#1e2130;--dim:#6b7280;--dim2:#9ca3af;
  --ln:#e5e7eb;--ln2:#d1d5db;
  --blue:#2563eb;--blue-lt:#dbeafe;
  --green:#10b981;--green-lt:#d1fae5;
  --red:#ef4444;--red-lt:#fee2e2;
  --amb:#f59e0b;--amb-lt:#fef3c7;
  --pur:#8b5cf6;--pur-lt:#ede9fe;
  --arr:#adb5c8;
  --ph1:#6366f1;--ph2:#3b82f6;--ph3:#8b5cf6;
  --ph4:#06b6d4;--ph5:#8b5cf6;--ph6:#f59e0b;--ph7:#10b981;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  background:var(--canvas-bg);height:100vh;overflow:hidden;display:flex;flex-direction:column;
  color:var(--tx)}

/* ── HEADER ── */
.hd{height:48px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--card-bd);
  display:flex;align-items:center;padding:0 20px;gap:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;
  border-right:1px solid var(--ln);padding-right:16px;margin-right:16px}
.phase-nav{display:flex;align-items:center;gap:0;flex:1}
.ph-item{display:flex;align-items:center;gap:0}
.ph-lbl{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:99px;
  white-space:nowrap;cursor:pointer;transition:all .15s}
.ph-lbl:hover{filter:brightness(.9)}
.ph-arr{font-size:10px;color:var(--dim2);margin:0 2px;padding:0 2px}
.zoom-ctrl{margin-left:auto;display:flex;align-items:center;gap:6px;border-left:1px solid var(--ln);padding-left:16px}
.zbtn{background:#f8f9fa;border:1px solid var(--card-bd);color:var(--dim);
  border-radius:5px;padding:4px 11px;font-size:12px;cursor:pointer;transition:all .1s}
.zbtn:hover{background:var(--ln)}
.zval{font-size:12px;color:var(--dim);min-width:38px;text-align:center}

/* ── CANVAS WRAP ── */
.wrap{flex:1;overflow:hidden;position:relative;cursor:grab}
.wrap.drag{cursor:grabbing}
.canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* ── PHASE HEADERS ON CANVAS ── */
.ph-head{position:absolute;top:0;display:flex;align-items:center;gap:6px;white-space:nowrap}
.ph-head-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  display:flex;align-items:center;gap:5px}
.ph-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:900}
.ph-vline{position:absolute;top:0;width:1px;border-left:1.5px dashed;opacity:.15}

/* ── NODE ── */
.node{position:absolute;cursor:pointer}
.node-lbl{font-size:10.5px;font-weight:600;color:var(--dim);text-align:center;
  margin-bottom:5px;letter-spacing:.01em}
.node-card{background:var(--card);border:1px solid var(--card-bd);border-radius:8px;
  overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  transition:box-shadow .15s,transform .15s,border-color .15s;width:155px}
.node:hover .node-card{box-shadow:0 4px 16px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.08);
  transform:translateY(-2px);border-color:#c8cbd4}
.node.sel .node-card{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.2),0 4px 16px rgba(0,0,0,.1)}

/* ── SCREEN CHROME ── */
.sc-bar{height:22px;background:#f8f9fc;border-bottom:1px solid var(--ln);
  display:flex;align-items:center;padding:0 8px;gap:5px}
.sc-dot{width:5px;height:5px;border-radius:50%}
.sc-title{font-size:8.5px;color:var(--dim);font-weight:600;margin:0 auto;letter-spacing:.02em}
.sc-body{padding:8px}

/* ── WIREFRAME PRIMITIVES ── */
.ln{height:7px;background:var(--ln);border-radius:3px;margin:3px 0}
.ln.sm{height:6px}.ln.xs{height:5px}
.ln.dark{background:var(--ln2)}
.btn{height:21px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;margin:4px 0}
.btn.pri{background:var(--blue);color:#fff}
.btn.sec{background:var(--ln);color:var(--dim)}
.btn.grn{background:var(--green);color:#fff}
.btn.red{background:var(--red-lt);color:var(--red)}
.inp{height:18px;border:1px solid var(--ln2);border-radius:4px;background:#fafbfc;
  margin:3px 0;display:flex;align-items:center;padding:0 6px}
.inp.focus{border-color:var(--blue)}
.inp-txt{height:5px;background:var(--ln);border-radius:2px;width:60%}
.inp-ph{height:5px;background:var(--ln2);border-radius:2px;width:45%}
.chip{display:inline-flex;align-items:center;height:14px;border-radius:99px;
  padding:0 6px;font-size:7.5px;font-weight:700;margin:1px 2px 1px 0}
.card-sm{background:#f8f9fc;border:1px solid var(--ln);border-radius:5px;padding:5px 6px;margin:2px 0}
.avatar{width:20px;height:20px;border-radius:50%;background:var(--ln)}
.avatar.sm{width:14px;height:14px}
.row{display:flex;gap:4px;align-items:center;margin:2px 0}
.col{display:flex;flex-direction:column;gap:0}
.sep{height:1px;background:var(--ln);margin:5px 0}
.stage-box{flex:1;height:12px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:5.5px;font-weight:700}
.mini-chart{display:flex;align-items:flex-end;gap:2px;height:26px}
.mini-bar{flex:1;border-radius:2px 2px 0 0}
.gauge-wrap{display:flex;align-items:center;justify-content:center;padding:4px 0}
.log-line{height:8px;border-radius:2px;margin:2px 0;background:var(--ln)}
.kpi-card{background:#f8f9fc;border:1px solid var(--ln);border-radius:4px;
  flex:1;padding:4px 5px;text-align:center}
.option-card{background:#f8f9fc;border:1px solid var(--ln);border-radius:4px;flex:1;padding:4px;text-align:center}
.option-card.sel{background:var(--blue-lt);border-color:var(--blue)}
.list-row{display:flex;align-items:center;gap:4px;height:16px;padding:0 2px;
  border-bottom:1px solid var(--ln)}
.nav-item{height:6px;background:var(--ln2);border-radius:2px}
.tag{height:10px;border-radius:99px;padding:0 5px;display:inline-flex;align-items:center}

/* ── SVG ARROWS ── */
.arr-path{fill:none;stroke:var(--arr);stroke-width:1.5;marker-end:url(#arrowhead)}
.arr-label-bg{fill:#fff;stroke:var(--ln);stroke-width:.8}
.arr-label-txt{font-size:9px;font-family:system-ui;fill:var(--dim2)}

/* ── DETAIL PANEL ── */
.panel{position:fixed;right:0;top:48px;bottom:0;width:320px;background:#fff;
  border-left:1px solid var(--card-bd);box-shadow:-4px 0 16px rgba(0,0,0,.08);
  transform:translateX(100%);transition:transform .22s ease;
  display:flex;flex-direction:column;z-index:100}
.panel.open{transform:translateX(0)}
.panel-hd{padding:14px 16px 12px;border-bottom:1px solid var(--ln);
  display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.panel-title{font-size:15px;font-weight:800;flex:1;color:var(--tx)}
.panel-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--dim2);padding:0 2px}
.panel-body{overflow-y:auto;flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.p-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--dim2);margin-bottom:7px}
.p-story{background:#f8f9ff;border-left:3px solid var(--blue);padding:9px 12px;
  border-radius:0 6px 6px 0;font-size:12px;color:var(--dim);font-style:italic;line-height:1.65}
.p-story strong{color:var(--tx);font-style:normal}
.p-ac-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;
  border-radius:6px;border:1px solid var(--ln);margin-bottom:4px;
  font-size:11.5px;color:#374151;line-height:1.45}
.p-ac-item .ck{color:var(--green);font-weight:700;font-size:10px;flex-shrink:0;margin-top:1px}
.p-tech{background:#f8faff;border:1px solid #e0e7ff;border-radius:6px;padding:9px 11px;
  font-size:11px;color:var(--dim);font-family:monospace;line-height:1.7}
.p-nav-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:6px;
  border:1px solid var(--ln);margin-bottom:4px;font-size:12px;color:var(--dim);
  cursor:pointer;transition:all .15s}
.p-nav-item:hover{background:#f8f9ff;border-color:#c7d2fe;color:var(--tx)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:99px}
</style>
</head>
<body>

<div class="hd">
  <div class="logo">🗺 TaskConductor <span style="font-size:10px;background:#dbeafe;color:var(--blue);padding:2px 8px;border-radius:99px;font-weight:700">User Flow</span></div>
  <div class="phase-nav" id="phase-nav"></div>
  <div class="zoom-ctrl">
    <button class="zbtn" onclick="Z(-0.12)">−</button>
    <span class="zval" id="zval">75%</span>
    <button class="zbtn" onclick="Z(0.12)">+</button>
    <button class="zbtn" onclick="R()">重置</button>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="canvas" id="canvas">

    <!-- SVG arrows layer -->
    <svg id="svgL" style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0.5 L0,5.5 L7,3 z" fill="#adb5c8"/>
        </marker>
      </defs>
    </svg>

  </div>
</div>

<!-- Detail Panel -->
<div class="panel" id="panel">
  <div class="panel-hd">
    <div>
      <div class="panel-title" id="p-title">—</div>
      <div style="font-size:11px;margin-top:3px" id="p-phase">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="p-body"></div>
</div>

// BUILD NODES

function buildNodes() {
  const canvas = document.getElementById('canvas');
  NODES.forEach(n => {
    const wrapper = document.createElement('div');
    wrapper.className = 'node';
    wrapper.id = n.id;
    wrapper.style.cssText = `left:${n.x}px;top:${n.y}px`;

    const lbl = document.createElement('div');
    lbl.className = 'node-lbl';
    lbl.textContent = n.label;
    wrapper.appendChild(lbl);

    const card = document.createElement('div');
    card.className = 'node-card';

    if(!n.dark) {
      const bar = document.createElement('div');
      bar.className = 'sc-bar';
      const ph = PHASES.find(p=>p.id===DETAILS[n.key].ph);
      bar.innerHTML = `
        <div class="sc-dot" style="background:#ef4444"></div>
        <div class="sc-dot" style="background:#f59e0b"></div>
        <div class="sc-dot" style="background:#22c55e"></div>
        <div class="sc-title">${n.label}</div>`;
      card.appendChild(bar);
    }

    card.insertAdjacentHTML('beforeend', WF[n.key]());
    wrapper.appendChild(card);
    wrapper.addEventListener('click', () => showPanel(n.key, n.id));
    canvas.appendChild(wrapper);
  });

  // Phase headers
  const phaseX = {1:24,2:222,3:430,4:660,5:900,6:1130,7:1590};
  PHASES.forEach(ph => {
    const x = phaseX[ph.id];
    if(!x) return;
    const el = document.createElement('div');
    el.className = 'ph-head';
    el.style.cssText = `left:${x}px`;
    el.innerHTML = `<div class="ph-head-lbl" style="color:${ph.color}">
      <div class="ph-num" style="background:${ph.bg};color:${ph.color}">${ph.id}</div>
      ${ph.label.slice(2)}
    </div>`;
    canvas.appendChild(el);

    if(ph.id < 7) {
      const vl = document.createElement('div');
      vl.className = 'ph-vline';
      const nextPh = phaseX[ph.id+1];
      vl.style.cssText = `left:${nextPh-10}px;height:680px;border-color:${ph.color}`;
      canvas.appendChild(vl);
    }
  });
}

// ════════════════════════════════════════════
// DRAW ARROWS
// ════════════════════════════════════════════

function getEdgePt(id, side, frac) {
  const el = document.getElementById(id);
  if(!el) return {x:0,y:0};
  const l=parseInt(el.style.left), t=parseInt(el.style.top);
  const w=el.offsetWidth, h=el.offsetHeight;
  switch(side){
    case 'r': return {x:l+w,    y:t+h*frac};
    case 'l': return {x:l,      y:t+h*frac};
    case 't': return {x:l+w*frac,y:t};
    case 'b': return {x:l+w*frac,y:t+h};
    default:  return {x:l+w/2,  y:t+h/2};
  }
}

function drawArrows() {
  const svg = document.getElementById('svgL');
  svg.innerHTML = `<defs>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L7,3 z" fill="#adb5c8"/>
    </marker>
  </defs>`;

  ARROWS.forEach((a, idx) => {
    const fs = a.fx==='r'?'r':a.fx==='l'?'l':a.fx==='t'?'t':'b';
    const ts = a.tx==='r'?'r':a.tx==='l'?'l':a.tx==='t'?'t':'b';
    const p1 = getEdgePt(a.f, fs, a.fy||0.5);
    const p2 = getEdgePt(a.t, ts, a.ty||0.5);
    if(!p1||!p2||(!p1.x&&!p1.y)) return;

    const dx=p2.x-p1.x, dy=p2.y-p1.y;
    let cx1=p1.x, cy1=p1.y, cx2=p2.x, cy2=p2.y;

    if(a.curve==='up') {
      const miny = Math.min(p1.y,p2.y) - 50;
      cx1=p1.x; cy1=miny; cx2=p2.x; cy2=miny;
    } else if(a.curve==='left') {
      const minx = Math.min(p1.x,p2.x) - 50;
      cx1=minx; cy1=p1.y; cx2=minx; cy2=p2.y;
    } else if(fs==='r'||fs==='l') {
      cx1=p1.x+dx*0.45; cy1=p1.y; cx2=p2.x-dx*0.45; cy2=p2.y;
    } else {
      cx1=p1.x; cy1=p1.y+dy*0.45; cx2=p2.x; cy2=p2.y-dy*0.45;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','arr-path');
    path.setAttribute('d',`M${p1.x},${p1.y} C${cx1},${cy1} ${cx2},${cy2} ${p2.x},${p2.y}`);
    svg.appendChild(path);

    if(a.lb) {
      const mx=(p1.x+p2.x)/2+(cx1+cx2)/2*.1, my=(p1.y+p2.y)/2+(cy1+cy2)/2*.1;
      const rw=a.lb.length*5.5+8;
      const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg.setAttribute('class','arr-label-bg');
      bg.setAttribute('x',mx-rw/2); bg.setAttribute('y',my-8);
      bg.setAttribute('width',rw); bg.setAttribute('height',14); bg.setAttribute('rx',3);
      svg.appendChild(bg);
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('class','arr-label-txt'); txt.setAttribute('x',mx); txt.setAttribute('y',my+2);
      txt.setAttribute('text-anchor','middle'); txt.textContent=a.lb;
      svg.appendChild(txt);
    }
  });
}

// ════════════════════════════════════════════
// DETAIL PANEL
// ════════════════════════════════════════════

function showPanel(key, nodeId) {
  const d = DETAILS[key]; if(!d) return;
  const ph = PHASES.find(p=>p.id===d.ph);

  document.getElementById('p-title').textContent = d.title;
  const phEl = document.getElementById('p-phase');
  phEl.textContent = ph.label;
  phEl.style.color = ph.color;
  phEl.style.background = ph.bg;
  phEl.style.padding = '2px 8px';
  phEl.style.borderRadius = '99px';
  phEl.style.display = 'inline-block';
  phEl.style.fontSize = '11px';
  phEl.style.fontWeight = '700';

  document.getElementById('p-body').innerHTML = `
    <div><div class="p-lbl">👤 用户故事</div>
      <div class="p-story">${d.story}</div></div>
    <div><div class="p-lbl">✅ 验收标准</div>
      ${d.ac.map(a=>`<div class="p-ac-item"><span class="ck">✓</span><span>${a}</span></div>`).join('')}</div>
    <div><div class="p-lbl">🔌 接口定义</div>
      <div class="p-tech">${d.tech}</div></div>
    <div><div class="p-lbl">🔗 导航路径</div>
      ${d.nav.map(n=>`<div class="p-nav-item" onclick="jumpTo('${n.to}')">
        <span style="color:var(--dim2);font-size:11px">→</span>
        <span>${n.l}</span></div>`).join('')}</div>`;

  document.querySelectorAll('.node').forEach(el=>el.classList.remove('sel'));
  document.getElementById(nodeId)?.classList.add('sel');
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('sel'));
}

function jumpTo(id) {
  const el=document.getElementById(id); if(!el) return;
  const l=parseInt(el.style.left), t=parseInt(el.style.top);
  const wrap=document.getElementById('wrap');
  tx=wrap.clientWidth*0.3-(l+80)*scale;
  ty=wrap.clientHeight/2-(t+80)*scale;
  applyT();
}

// ════════════════════════════════════════════
// PAN / ZOOM
// ════════════════════════════════════════════

let scale=0.75, tx=40, ty=55, drag=false, mx=0, my=0;

function applyT() {
  document.getElementById('canvas').style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zval').textContent=Math.round(scale*100)+'%';
}
function Z(d, cx, cy) {
  const wrap=document.getElementById('wrap');
  const ox=cx??wrap.clientWidth/2, oy=cy??wrap.clientHeight/2;
  const ns=Math.min(2,Math.max(0.2,scale+d));
  tx=ox-(ox-tx)*(ns/scale); ty=oy-(oy-ty)*(ns/scale); scale=ns; applyT();
}
function R(){ scale=0.75;tx=40;ty=55;applyT(); }

const wrap=document.getElementById('wrap');
wrap.addEventListener('mousedown',e=>{ if(e.target.closest('.node'))return; drag=true;mx=e.clientX-tx;my=e.clientY-ty;wrap.classList.add('drag'); });
window.addEventListener('mousemove',e=>{ if(!drag)return; tx=e.clientX-mx;ty=e.clientY-my;applyT(); });
window.addEventListener('mouseup',()=>{ drag=false;wrap.classList.remove('drag'); });
wrap.addEventListener('wheel',e=>{ e.preventDefault(); const r=wrap.getBoundingClientRect(); Z(e.deltaY<0?.1:-.1,e.clientX-r.left,e.clientY-r.top); },{passive:false});

// ════════════════════════════════════════════
// PHASE NAV (header)
// ════════════════════════════════════════════

function buildPhaseNav() {
  const nav=document.getElementById('phase-nav');
  PHASES.forEach((ph,i) => {
    const item=document.createElement('div'); item.className='ph-item';
    item.innerHTML = `<span class="ph-lbl" style="background:${ph.bg};color:${ph.color}" onclick="focusPhase(${ph.id})">${ph.label}</span>`;
    if(i<PHASES.length-1) item.insertAdjacentHTML('beforeend',`<span class="ph-arr">——→</span>`);
    nav.appendChild(item);
  });
}

const phaseXMap={1:24,2:222,3:430,4:660,5:900,6:1130,7:1590};
function focusPhase(id) {
  const x=phaseXMap[id]; if(!x) return;
  const wrap=document.getElementById('wrap');
  tx=60-x*scale; ty=55; applyT();
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════

buildPhaseNav();
buildNodes();
applyT();
window.addEventListener('load', () => { setTimeout(drawArrows, 80); });
window.addEventListener('resize', applyT);
</script>
